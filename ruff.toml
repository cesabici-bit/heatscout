# Ruff configuration for HeatScout
target-version = "py310"
line-length = 100

[lint]
select = [
    "F",   # Pyflakes (unused imports, variables)
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "I",   # isort (import sorting)
]
ignore = [
    "E501",  # line too long — handled by formatter
]

[format]
quote-style = "double"
